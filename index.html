<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bible Verse Viewer</title>

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}


.container {
    background: rgba(255, 255, 255, 0.95);
    padding: 40px;
    width: 400px;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    text-align: center;
    transition: transform 0.3s;
}

.container:hover {
    transform: translateY(-5px);
}


h1 {
    color: #333;
    margin-bottom: 10px;
}

.subtitle {
    color: #666;
    font-size: 14px;
    margin-bottom: 25px;
}


.verse-box {
    min-height: 100px;
    background: #f0f4f8;
    border-left: 5px solid #4ca1af;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    font-size: 16px;
    color: #444;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    transition: background 0.3s, transform 0.3s;
}

.verse-box.fade {
    animation: fadeIn 0.6s;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px);}
    to { opacity: 1; transform: translateY(0);}
}


button {
    background: #4ca1af;
    color: white;
    border: none;
    padding: 12px 25px;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.3s, transform 0.2s;
}

button:hover {
    background: #2c3e50;
    transform: scale(1.05);
}


.counter {
    margin-top: 15px;
    color: #888;
    font-size: 13px;
}
</style>
</head>
<body>

    <h1>Bible Verse</h1>

    <div class="verse-box" id="verse">

    <div class="counter" id="counter">

</div>

function showVerse() {
    const verseBox = document.getElementById("verse");
    verseBox.classList.remove("fade");  // reset animation
    void verseBox.offsetWidth;           // trigger reflow
    verseBox.classList.add("fade");     // add fade animation
